  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="#1a1d27" stroke="#2a2d3a" stroke-width="1.5"/>
