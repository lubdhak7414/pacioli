[tool.pytest.ini_options]
# Run modules from the repo root so `import main`, `import report_engine`, etc. resolve.
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# Pyflakes (real errors: unused imports, undefined names) + syntax errors.
# Kept lenient to avoid stylistic churn on an MVP codebase.
select = ["F", "E9"]
